<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌙 Abyss Messenger</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0b0815;
    font-family: 'Inter', sans-serif;
    color: white;
    overflow: hidden;
}

/* ⭐ STARS */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
        radial-gradient(2px 2px at 10% 20%, white, transparent),
        radial-gradient(2px 2px at 25% 70%, white, transparent),
        radial-gradient(2px 2px at 40% 40%, white, transparent),
        radial-gradient(2px 2px at 60% 10%, white, transparent),
        radial-gradient(2px 2px at 80% 60%, white, transparent),
        radial-gradient(2px 2px at 90% 30%, white, transparent),
        radial-gradient(2px 2px at 50% 85%, white, transparent),
        radial-gradient(2px 2px at 15% 55%, white, transparent);
    opacity: 0.8;
}

.chat-card {
    width: 95%;
    max-width: 480px;
    height: 90vh;
    max-height: 680px;
    background: rgba(24,18,44,0.97);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 80px rgba(147,51,234,0.5);
    overflow: hidden;
}

.chat-header {
    padding: 20px;
    text-align: center;
    font-family: 'Cinzel', serif;
    letter-spacing: 3px;
    font-size: 18px;
    background: linear-gradient(90deg,#6d28d9,#9333ea);
}

.messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.message-wrapper {
    max-width: 75%;
}

.mine {
    align-self: flex-end;
    text-align: right;
}

.username {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: #c084fc;
    margin-bottom: 4px;
}

.message {
    padding: 12px 16px;
    border-radius: 18px;
    background: rgba(124,58,237,0.25);
    word-wrap: break-word;
}

.mine .message {
    background: #7c3aed;
}

/* INPUT */
.chat-input {
    padding: 15px;
    background: #1a142d;
    display: flex;
    gap: 8px;
    align-items: center;
    position: relative;
}

.chat-input input {
    padding: 10px;
    border-radius: 12px;
    border: none;
    background: #352a54;
    color: white;
    font-size: 14px;
    outline: none;
}

#usernameInput {
    width: 90px;
}

#messageInput {
    flex: 1;
}

button {
    padding: 10px 14px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: 500;
}

#sendBtn {
    background: linear-gradient(90deg,#7c3aed,#a855f7);
    color: white;
}

#emojiBtn {
    background: #352a54;
    font-size: 18px;
}

/* EMOJI PANEL */
.emoji-panel {
    position: absolute;
    bottom: 70px;
    right: 10px;
    background: #1e1835;
    padding: 10px;
    border-radius: 12px;
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    width: 200px;
}

.emoji-panel span {
    cursor: pointer;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="chat-card">
    <div class="chat-header">🌙 ABYSS MESSENGER</div>

    <div id="messages" class="messages"></div>
<div id="typingIndicator" style="padding: 0 20px; font-size: 12px; color: #c084fc;"></div>
    <div class="chat-input">
        <input id="usernameInput" placeholder="Name">
        <input id="messageInput" placeholder="Scrie mesaj...">
        <button id="emojiBtn">😊</button>
        <button id="sendBtn">Trimite</button>

        <div id="emojiPanel" class="emoji-panel">
            <span>😀</span><span>😂</span><span>😍</span><span>🥺</span>
            <span>😎</span><span>🔥</span><span>💜</span><span>🌙</span>
            <span>✨</span><span>😭</span><span>😈</span><span>💀</span>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const messages = document.getElementById("messages");
const input = document.getElementById("messageInput");
const usernameInput = document.getElementById("usernameInput");
const sendBtn = document.getElementById("sendBtn");
const emojiBtn = document.getElementById("emojiBtn");
const emojiPanel = document.getElementById("emojiPanel");

/* TOGGLE EMOJI */
emojiBtn.onclick = () => {
    emojiPanel.style.display =
        emojiPanel.style.display === "flex" ? "none" : "flex";
};

/* ADD EMOJI */
emojiPanel.querySelectorAll("span").forEach(e => {
    e.onclick = () => {
        input.value += e.textContent;
        input.focus();
    };
});

/* SEND */
function sendMessage() {
    const message = input.value.trim();
    const username = usernameInput.value.trim();
    if (!message || !username) return;

    socket.emit("send_message", {
        user: username,
        text: message
    });

    input.value = "";
}

sendBtn.onclick = sendMessage;

input.addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
});

/* RECEIVE */
socket.on("receive_message", data => {
    const wrapper = document.createElement("div");
    wrapper.classList.add("message-wrapper");

    if (data.user === usernameInput.value.trim()) {
        wrapper.classList.add("mine");
    }

    const name = document.createElement("div");
    name.classList.add("username");
    name.textContent = data.user;

    const bubble = document.createElement("div");
    bubble.classList.add("message");
    bubble.textContent = data.text;

    wrapper.appendChild(name);
    wrapper.appendChild(bubble);
    messages.appendChild(wrapper);
    messages.scrollTop = messages.scrollHeight;
});
</script>

</body>
</html>
