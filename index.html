<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🖤 Abyss Messenger</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f0b1a, #1b1230);
    font-family: Arial, sans-serif;
}

.chat-card {
    width: 480px;
    height: 650px;
    backdrop-filter: blur(20px);
    background: rgba(30,24,48,0.8);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 60px rgba(124,58,237,0.4);
}

.chat-header {
    background: linear-gradient(90deg, #5b21b6, #9333ea);
    padding: 20px;
    text-align: center;
    color: white;
    font-weight: bold;
    font-size: 20px;
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.message-wrapper {
    display: flex;
    gap: 8px;
    align-items: flex-end;
}

.mine {
    justify-content: flex-end;
}

.avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #7c3aed;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.message {
    background: rgba(124,58,237,0.2);
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 60%;
    color: white;
    animation: fadeIn 0.3s ease;
}

.mine .message {
    background: #7c3aed;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

.chat-input {
    display: flex;
    padding: 15px;
    background: rgba(40,30,70,0.8);
    gap: 8px;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #3b2f52;
    color: white;
}

.chat-input button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #7c3aed, #a855f7);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.chat-input button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="chat-card">
    <div class="chat-header">🖤 Abyss Messenger</div>
    <div id="messages" class="messages"></div>
    <div class="chat-input">
        <input id="usernameInput" placeholder="Username..." />
        <input id="messageInput" placeholder="Scrie mesaj..." />
        <button onclick="sendMessage()">Trimite</button>
    </div>
</div>

<audio id="msgSound">
    <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const input = document.getElementById("messageInput");
const usernameInput = document.getElementById("usernameInput");
const messages = document.getElementById("messages");
const sound = document.getElementById("msgSound");

const params = new URLSearchParams(window.location.search);
const room = params.get("room") || "default";

socket.emit("join_room", room);

window.sendMessage = function() {
    const message = input.value.trim();
    const username = usernameInput.value.trim();
    if (!username || !message) return;

    socket.emit("send_message", {
        room: room,
        user: username,
        text: message
    });

    input.value = "";
};

input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});

socket.on("receive_message", (data) => {

    const wrapper = document.createElement("div");
    wrapper.classList.add("message-wrapper");

    const currentUser = usernameInput.value.trim();

    if (data.user === currentUser) {
        wrapper.classList.add("mine");
    }

    const avatar = document.createElement("div");
    avatar.classList.add("avatar");
    avatar.innerText = data.user.charAt(0).toUpperCase();

    const bubble = document.createElement("div");
    bubble.classList.add("message");
    bubble.innerText = data.text;

    if (data.user === currentUser) {
        wrapper.appendChild(bubble);
        wrapper.appendChild(avatar);
    } else {
        wrapper.appendChild(avatar);
        wrapper.appendChild(bubble);
        sound.play();
    }

    messages.appendChild(wrapper);
    messages.scrollTop = messages.scrollHeight;
});
</script>

</body>
</html>
