<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🖤 Abyss Messenger</title>
<link rel="icon" type="image/png" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f0b1a,#1b1230);
    font-family:'Poppins',sans-serif;
}

/* ⭐ static stars */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        radial-gradient(2px 2px at 10% 20%, white, transparent),
        radial-gradient(2px 2px at 25% 70%, white, transparent),
        radial-gradient(2px 2px at 40% 40%, white, transparent),
        radial-gradient(2px 2px at 60% 10%, white, transparent),
        radial-gradient(2px 2px at 80% 60%, white, transparent),
        radial-gradient(2px 2px at 90% 30%, white, transparent),
        radial-gradient(2px 2px at 70% 80%, white, transparent),
        radial-gradient(2px 2px at 15% 90%, white, transparent);
    opacity:0.8;
    pointer-events:none;
}

/* chat */
.chat-card{
    width:480px;
    height:85vh;
    max-height:700px;
    background:rgba(30,24,48,0.95);
    border-radius:25px;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 80px rgba(124,58,237,0.4);
    position:relative;
    overflow:hidden;
}

/* 🐱 black cat head */
.cat{
    position:absolute;
    top:-28px;
    right:30px;
    font-size:46px;
    z-index:0;
    pointer-events:none;
}

/* header */
.chat-header{
    background:linear-gradient(90deg,#5b21b6,#9333ea);
    padding:18px;
    text-align:center;
    font-family:'Cinzel',serif;
    font-size:20px;
    letter-spacing:2px;
    color:white;
    z-index:1;
}

/* messages */
.messages{
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:14px;
    z-index:1;
}

.message{
    background:rgba(124,58,237,0.15);
    padding:10px 14px;
    border-radius:14px;
    color:white;
    font-size:14px;
}

.username{
    font-weight:500;
    color:#c084fc;
    font-size:13px;
    margin-bottom:4px;
}

/* shadow messages */
.shadow-message{
    background:rgba(0,0,0,0.45);
    border:1px solid rgba(255,77,109,0.4);
    color:#ff9ab0;
    font-style:italic;
}

/* typing */
.typing{
    font-size:12px;
    color:#a78bfa;
    padding:0 20px 6px 20px;
    z-index:1;
}

/* input */
.input-area{
    display:flex;
    gap:8px;
    padding:15px;
    z-index:1;
    align-items:center;
}

#usernameInput{
    width:90px;
}

#messageInput{
    flex:1;
    min-width:0;
}

#usernameInput,
#messageInput{
    background: rgba(255,255,255,0.08);
    color: white;
    border:none;
    padding:10px;
    border-radius:12px;
    outline:none;
}

#usernameInput::placeholder,
#messageInput::placeholder{
    color: rgba(255,255,255,0.4);
}

/* Chrome autofill fix */
input:-webkit-autofill{
    -webkit-box-shadow: 0 0 0 1000px rgba(255,255,255,0.08) inset !important;
    -webkit-text-fill-color: white !important;
}

button{
    border:none;
    padding:10px 14px;
    border-radius:12px;
    color:white;
    cursor:pointer;
    font-weight:500;
    flex-shrink:0;
}

#sendBtn{
    background:linear-gradient(90deg,#7c3aed,#a855f7);
}

#emojiBtn{
    background:#352a54;
}

/* Don't Press */
#dontPressBtn{
    position:fixed;
    bottom:40px;
    left:calc(50% + 260px);
    opacity:0.25;
    background:none;
    border:1px dashed #ff4d6d;
    color:#ff4d6d;
    font-size:11px;
    padding:4px 10px;
    border-radius:20px;
    transition:0.3s;
    z-index:9999;
}

#dontPressBtn:hover{
    opacity:1;
    transform:scale(1.05);
}

/* emoji panel */
.emoji-panel{
    position:fixed;
    bottom:120px;
    left:calc(50% + 120px);
    background:rgba(40,30,60,0.95);
    padding:10px;
    border-radius:12px;
    display:none;
    flex-wrap:wrap;
    gap:8px;
    width:200px;
    z-index:10000;
}

.emoji-panel span{
    cursor:pointer;
}
</style>
</head>

<body>

<div class="chat-card">

    <div class="cat">🐈‍⬛</div>
    <div class="chat-header">🌙 ABYSS MESSENGER</div>

    <div class="messages" id="messages"></div>
    <div class="typing" id="typingIndicator"></div>

    <div class="input-area">
        <input type="text" id="usernameInput" placeholder="Name">
        <input type="text" id="messageInput" placeholder="Scrie mesaj...">
        <button id="emojiBtn">😊</button>
        <button id="sendBtn">Trimite</button>
    </div>

</div>

<button id="dontPressBtn">Don't Press</button>

<div class="emoji-panel" id="emojiPanel">
    <span>😊</span><span>😂</span><span>😍</span>
    <span>😈</span><span>🖤</span><span>🔥</span>
    <span>✨</span><span>🥺</span><span>😎</span>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
const messages=document.getElementById("messages");
const input=document.getElementById("messageInput");
const usernameInput=document.getElementById("usernameInput");
const sendBtn=document.getElementById("sendBtn");
const emojiBtn=document.getElementById("emojiBtn");
const emojiPanel=document.getElementById("emojiPanel");
const typingIndicator=document.getElementById("typingIndicator");
const dontPressBtn=document.getElementById("dontPressBtn");

function sendMessage(){
    const message = input.value;
    const username = usernameInput.value.trim();

    if(message.length === 0 || username.length === 0) return;

    socket.emit("send_message",{username,message});
    input.value="";
}

sendBtn.onclick=sendMessage;

/* ENTER FIX (emoji works) */
input.addEventListener("keydown", e=>{
    if(e.key==="Enter"){
        e.preventDefault();
        sendMessage();
    }
});

usernameInput.addEventListener("keydown", e=>{
    if(e.key==="Enter"){
        e.preventDefault();
        sendMessage();
    }
});

socket.on("receive_message",data=>{
    const div=document.createElement("div");
    div.classList.add("message");
    div.innerHTML=`
        <div class="username">${data.username}</div>
        <div>${data.message}</div>
    `;
    messages.appendChild(div);
    messages.scrollTop=messages.scrollHeight;
});

input.addEventListener("input",()=>{
    const username=usernameInput.value.trim();
    if(username)socket.emit("typing",username);
});

socket.on("user_typing",username=>{
    typingIndicator.textContent=username+" scrie...";
    setTimeout(()=>typingIndicator.textContent="",1500);
});

emojiBtn.onclick=()=>{
    emojiPanel.style.display=
        emojiPanel.style.display==="flex"?"none":"flex";
};

emojiPanel.querySelectorAll("span").forEach(emoji=>{
    emoji.onclick=()=>{
        input.value+=emoji.textContent;
        emojiPanel.style.display="none";
    };
});

dontPressBtn.onclick=()=>{
    const funny=[
        "😑 I literally said don't.",
        "🙄 Why can't you follow instructions?",
        "👁 The abyss noticed that.",
        "🐈‍⬛ The black cat judges you.",
        "💀 You unlocked absolutely nothing.",
      " esti prost???.",
      " Beeee pisatuleee.",
      "nigga nigga nigga.",
      "ba coaie.",
    "la ce te uiti.",
      "pula pula pula."
    ];
    const random=funny[Math.floor(Math.random()*funny.length)];
    const div=document.createElement("div");
    div.classList.add("message","shadow-message");
    div.innerHTML=`<div class="username">Abyss</div><div>${random}</div>`;
    messages.appendChild(div);
    messages.scrollTop=messages.scrollHeight;
};
</script>

</body>
</html>
