<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🖤 Abyss Messenger</title>

<!-- Google Font pentru username -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: #140f1f;
    overflow: hidden;
}

/* 🔮 Floating bubbles */
.bubbles {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.bubbles span {
    position: absolute;
    bottom: -100px;
    background: rgba(168, 85, 247, 0.15);
    border-radius: 50%;
    animation: rise linear infinite;
}

@keyframes rise {
    from { transform: translateY(0); opacity: 0.4; }
    to { transform: translateY(-120vh); opacity: 0; }
}

/* 🌑 Chat Card */
.chat-card {
    width: 460px;
    height: 620px;
    background: #1e1830;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 50px rgba(124,58,237,0.3);
    z-index: 1;
}

/* Header */
.chat-header {
    background: linear-gradient(90deg, #5b21b6, #9333ea);
    padding: 20px;
    text-align: center;
    color: white;
    font-weight: bold;
    font-size: 20px;
    letter-spacing: 1px;
}

/* Messages */
.messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* Message Bubble */
.message {
    background: rgba(124,58,237,0.15);
    padding: 12px 14px;
    border-radius: 12px;
    animation: fadeIn 0.3s ease;
}

.username {
    font-family: 'Orbitron', sans-serif;
    color: #c084fc;
    font-size: 14px;
    margin-bottom: 4px;
    text-shadow: 0 0 6px rgba(168,85,247,0.6);
}

.text {
    color: white;
    font-size: 14px;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Input Area */
.chat-input {
    display: flex;
    padding: 15px;
    background: #2a2142;
    gap: 8px;
}

.chat-input input {
    flex: 1;
    min-width: 0;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #3b2f52;
    color: white;
}

.chat-input input::placeholder {
    color: #c4b5fd;
}

.chat-input button {
    min-width: 100px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #7c3aed, #a855f7);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.chat-input button:hover {
    background: #a855f7;
}
</style>
</head>

<body>

<!-- 🔮 Bubbles -->
<div class="bubbles">
    <span style="left:10%; width:20px; height:20px; animation-duration:12s;"></span>
    <span style="left:25%; width:35px; height:35px; animation-duration:18s;"></span>
    <span style="left:40%; width:15px; height:15px; animation-duration:10s;"></span>
    <span style="left:55%; width:30px; height:30px; animation-duration:16s;"></span>
    <span style="left:70%; width:25px; height:25px; animation-duration:14s;"></span>
    <span style="left:85%; width:40px; height:40px; animation-duration:20s;"></span>
</div>

<div class="chat-card">

    <div class="chat-header">
        🖤 Abyss Messenger
    </div>

    <div id="messages" class="messages"></div>

    <div class="chat-input">
        <input id="usernameInput" placeholder="Username..." />
        <input id="messageInput" placeholder="Scrie mesaj..." />
        <button onclick="sendMessage()">Trimite</button>
    </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io("http://localhost:3001");

const input = document.getElementById("messageInput");
const usernameInput = document.getElementById("usernameInput");
const messages = document.getElementById("messages");

window.sendMessage = function() {
    const message = input.value.trim();
    const username = usernameInput.value.trim();
    if (!username || !message) return;

    socket.emit("send_message", {
        user: username,
        text: message
    });

    input.value = "";
};

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

socket.on("receive_message", (data) => {
    const wrapper = document.createElement("div");
    wrapper.classList.add("message");

    const name = document.createElement("div");
    name.classList.add("username");
    name.innerText = data.user;

    const text = document.createElement("div");
    text.classList.add("text");
    text.innerText = data.text;

    wrapper.appendChild(name);
    wrapper.appendChild(text);
    messages.appendChild(wrapper);

    messages.scrollTop = messages.scrollHeight;
});
</script>

</body>
</html>
