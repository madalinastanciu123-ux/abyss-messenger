<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🖤 Abyss Messenger</title>
<link rel="icon" type="image/png" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f0b1a,#1b1230);
    font-family:'Poppins',sans-serif;
}

/* ⭐ STARS */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        radial-gradient(2px 2px at 10% 20%, white, transparent),
        radial-gradient(2px 2px at 25% 70%, white, transparent),
        radial-gradient(2px 2px at 40% 40%, white, transparent),
        radial-gradient(2px 2px at 60% 10%, white, transparent),
        radial-gradient(2px 2px at 80% 60%, white, transparent),
        radial-gradient(2px 2px at 90% 30%, white, transparent),
        radial-gradient(2px 2px at 50% 80%, white, transparent),
        radial-gradient(2px 2px at 15% 50%, white, transparent),
        radial-gradient(2px 2px at 70% 75%, white, transparent),
        radial-gradient(2px 2px at 35% 15%, white, transparent);
    opacity:0.8;
    pointer-events:none;
}

/* CHAT CARD */
.chat-card{
    width:480px;
    height:88vh;
    max-height:700px;
    background:rgba(30,24,48,0.95);
    border-radius:25px;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 80px rgba(124,58,237,0.4);
    position:relative;
    overflow:hidden;
    z-index:2;
}

/* 🐱 CUTE CAT HEAD (behind card) */
.cat{
    position:absolute;
    top:-28px;
    right:35px;
    width:60px;
    height:60px;
    z-index:1;
    pointer-events:none;
}

/* HEADER */
.chat-header{
    background:linear-gradient(90deg,#5b21b6,#9333ea);
    padding:18px;
    text-align:center;
    font-family:'Cinzel',serif;
    font-size:20px;
    letter-spacing:2px;
    color:white;
}

/* MESSAGES */
.messages{
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:14px;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
}

.message{
    background:rgba(124,58,237,0.15);
    padding:10px 14px;
    border-radius:14px;
    color:white;
    font-size:14px;
}

.username{
    font-weight:500;
    color:#c084fc;
    font-size:13px;
    margin-bottom:4px;
}

/* TYPING */
.typing{
    font-size:12px;
    color:#a78bfa;
    padding:0 20px 6px 20px;
}

/* INPUT AREA */
.input-area{
    display:flex;
    gap:10px;
    padding:15px;
}

input{
    flex:1;
    padding:10px;
    border-radius:12px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
    outline:none;
    min-width:0;
}

button{
    background:linear-gradient(90deg,#7c3aed,#a855f7);
    border:none;
    padding:10px 14px;
    border-radius:12px;
    color:white;
    cursor:pointer;
    font-weight:500;
    white-space:nowrap;
}

button:hover{
    opacity:0.9;
}

/* EMOJI PANEL */
.emoji-panel{
    position:absolute;
    bottom:85px;
    right:20px;
    background:rgba(40,30,60,0.95);
    padding:10px;
    border-radius:12px;
    display:none;
    flex-wrap:wrap;
    gap:8px;
    width:200px;
}

.emoji-panel span{
    cursor:pointer;
}
</style>
</head>

<body>

<div class="chat-card">

  <div class="cat">
<svg viewBox="0 0 100 100">
    <circle cx="50" cy="55" r="30" fill="#000"/>
    <polygon points="30,35 40,15 50,35" fill="#000"/>
    <polygon points="50,35 60,15 70,35" fill="#000"/>
    <circle cx="40" cy="55" r="4" fill="#fff"/>
    <circle cx="60" cy="55" r="4" fill="#fff"/>
</svg>
</div>
    <div class="chat-header">🌙 ABYSS MESSENGER</div>

    <div class="messages" id="messages"></div>

    <div class="typing" id="typingIndicator"></div>

    <div class="input-area">
        <input type="text" id="usernameInput" placeholder="Name">
        <input type="text" id="messageInput" placeholder="Scrie mesaj...">
        <button id="emojiBtn">😊</button>
        <button id="sendBtn">Trimite</button>
    </div>

    <div class="emoji-panel" id="emojiPanel">
        <span>😊</span><span>😂</span><span>😍</span>
        <span>😈</span><span>🖤</span><span>🔥</span>
        <span>✨</span><span>🥺</span><span>😎</span>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
const messages=document.getElementById("messages");
const input=document.getElementById("messageInput");
const usernameInput=document.getElementById("usernameInput");
const sendBtn=document.getElementById("sendBtn");
const emojiBtn=document.getElementById("emojiBtn");
const emojiPanel=document.getElementById("emojiPanel");
const typingIndicator=document.getElementById("typingIndicator");

/* SEND */
function sendMessage(){
    const message=input.value.trim();
    const username=usernameInput.value.trim();
    if(!message||!username)return;

    socket.emit("send_message",{username,message});
    input.value="";
}

sendBtn.onclick=sendMessage;
input.addEventListener("keypress",e=>{
    if(e.key==="Enter")sendMessage();
});

/* RECEIVE */
socket.on("receive_message",data=>{
    const div=document.createElement("div");
    div.classList.add("message");
    div.innerHTML=`
        <div class="username">${data.username}</div>
        <div>${data.message}</div>
    `;
    messages.appendChild(div);
    messages.scrollTop=messages.scrollHeight;
});

/* TYPING */
input.addEventListener("input",()=>{
    const username=usernameInput.value.trim();
    if(username)socket.emit("typing",username);
});

socket.on("user_typing",username=>{
    typingIndicator.textContent=username+" scrie...";
    setTimeout(()=>typingIndicator.textContent="",1500);
});

/* EMOJI */
emojiBtn.onclick=()=>{
    emojiPanel.style.display=
        emojiPanel.style.display==="flex"?"none":"flex";
};

emojiPanel.querySelectorAll("span").forEach(emoji=>{
    emoji.onclick=()=>{
        input.value+=emoji.textContent;
        emojiPanel.style.display="none";
    };
});
</script>

</body>
</html>
