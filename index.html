<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🖤 Abyss Messenger</title>
<link rel="icon" type="image/png" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f0b1a,#1b1230);
    font-family:'Poppins',sans-serif;
    transition:0.6s;
    overflow:hidden;
}

/* stars */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        radial-gradient(2px 2px at 10% 20%, white, transparent),
        radial-gradient(2px 2px at 25% 70%, white, transparent),
        radial-gradient(2px 2px at 40% 40%, white, transparent),
        radial-gradient(2px 2px at 60% 10%, white, transparent);
    opacity:0.6;
    pointer-events:none;
}

/* glitch */
@keyframes glitch{
  0%{transform:translate(2px,-2px);}
  25%{transform:translate(-2px,2px);}
  50%{transform:translate(2px,2px);}
  75%{transform:translate(-2px,-2px);}
  100%{transform:translate(0,0);}
}

.glitch-mode{
  animation:glitch 0.08s infinite;
}

/* flicker */
.screen-flicker{
  position:fixed;
  inset:0;
  background:black;
  opacity:0;
  pointer-events:none;
  z-index:20000;
}

/* chat */
.chat-card{
    width:480px;
    height:85vh;
    max-height:700px;
    background:rgba(30,24,48,0.95);
    border-radius:25px;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 80px rgba(124,58,237,0.4);
    overflow:hidden;
}

/* header */
.chat-header{
    background:linear-gradient(90deg,#5b21b6,#9333ea);
    padding:18px;
    text-align:center;
    font-family:'Cinzel',serif;
    font-size:20px;
    letter-spacing:2px;
    color:white;
}

/* messages */
.messages{
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.message{
    background:rgba(124,58,237,0.15);
    padding:10px 14px;
    border-radius:14px;
    color:white;
    font-size:14px;
}

.username{
    font-weight:500;
    color:#c084fc;
    font-size:13px;
    margin-bottom:4px;
}

.shadow-message{
    background:rgba(0,0,0,0.65);
    border:1px solid rgba(255,0,0,0.7);
    color:#ff4d6d;
    font-style:italic;
}

/* typing + corruption */
.typing,#corruptionIndicator{
    font-size:12px;
    padding:0 20px 6px 20px;
}

.typing{color:#a78bfa;}
#corruptionIndicator{color:#ff4d6d;opacity:0.8;}

/* input */
.input-area{
    display:flex;
    gap:8px;
    padding:15px;
    align-items:center;
}

#usernameInput{width:90px;}

#messageInput{
    flex:1;
    min-width:0;
}

#usernameInput,#messageInput{
    background:rgba(255,255,255,0.08);
    color:white;
    border:none;
    padding:10px;
    border-radius:12px;
    outline:none;
}

button{
    border:none;
    padding:10px 14px;
    border-radius:12px;
    color:white;
    cursor:pointer;
    font-weight:500;
    flex-shrink:0;
}

#sendBtn{
    background:linear-gradient(90deg,#7c3aed,#a855f7);
}

#emojiBtn{background:#352a54;}

/* Don't Press */
#dontPressBtn{
    position:fixed;
    bottom:40px;
    left:calc(50% + 260px);
    opacity:0.25;
    background:none;
    border:1px dashed #ff4d6d;
    color:#ff4d6d;
    font-size:11px;
    padding:4px 10px;
    border-radius:20px;
    transition:0.3s;
    z-index:9999;
}

#dontPressBtn:hover{
    opacity:1;
    transform:scale(1.05);
}

/* emoji */
.emoji-panel{
    position:fixed;
    bottom:120px;
    left:calc(50% + 120px);
    background:rgba(40,30,60,0.95);
    padding:10px;
    border-radius:12px;
    display:none;
    flex-wrap:wrap;
    gap:8px;
    width:200px;
    z-index:10000;
}

.emoji-panel span{cursor:pointer;}
</style>
</head>

<body>

<div id="flicker" class="screen-flicker"></div>

<div class="chat-card">
    <div class="chat-header">🌙 ABYSS MESSENGER</div>
    <div class="messages" id="messages"></div>
    <div class="typing" id="typingIndicator"></div>
    <div id="corruptionIndicator">Corruption: 0%</div>

    <div class="input-area">
        <input type="text" id="usernameInput" placeholder="Name">
        <input type="text" id="messageInput" placeholder="Scrie mesaj...">
        <button id="emojiBtn">😊</button>
        <button id="sendBtn">Trimite</button>
    </div>
</div>

<button id="dontPressBtn">Don't Press</button>

<div class="emoji-panel" id="emojiPanel">
    <span>😊</span><span>😂</span><span>😍</span>
    <span>😈</span><span>🖤</span><span>🔥</span>
    <span>✨</span><span>🥺</span><span>😎</span>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
const messages=document.getElementById("messages");
const input=document.getElementById("messageInput");
const usernameInput=document.getElementById("usernameInput");
const sendBtn=document.getElementById("sendBtn");
const emojiBtn=document.getElementById("emojiBtn");
const emojiPanel=document.getElementById("emojiPanel");
const dontPressBtn=document.getElementById("dontPressBtn");
const flicker=document.getElementById("flicker");

let corruptionLevel=0;

/* 🔊 HORROR SOUND GENERATOR */
function playHorrorSound(){
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    const distortion = audioCtx.createWaveShaper();

    function makeDistortionCurve(amount){
        const n_samples=44100;
        const curve=new Float32Array(n_samples);
        const deg=Math.PI/180;
        for(let i=0;i<n_samples;i++){
            const x=i*2/n_samples-1;
            curve[i]=(3+amount)*x*20*deg/(Math.PI+amount*Math.abs(x));
        }
        return curve;
    }

    distortion.curve=makeDistortionCurve(400);
    distortion.oversample='4x';

    oscillator.type="sawtooth";
    oscillator.frequency.setValueAtTime(70,audioCtx.currentTime);
    oscillator.frequency.exponentialRampToValueAtTime(20,audioCtx.currentTime+2);

    gainNode.gain.setValueAtTime(0.0001,audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.7,audioCtx.currentTime+0.4);
    gainNode.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+3);

    oscillator.connect(distortion);
    distortion.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();
    oscillator.stop(audioCtx.currentTime+3);
}

/* send */
function sendMessage(){
    const message=input.value;
    const username=usernameInput.value.trim();
    if(message.length===0||username.length===0)return;
    socket.emit("send_message",{username,message});
    input.value="";
}

sendBtn.onclick=sendMessage;

input.addEventListener("keydown",e=>{
    if(e.key==="Enter"){
        e.preventDefault();
        sendMessage();
    }
});

/* emoji */
emojiBtn.onclick=()=>{
    emojiPanel.style.display=
        emojiPanel.style.display==="flex"?"none":"flex";
};

emojiPanel.querySelectorAll("span").forEach(emoji=>{
    emoji.onclick=()=>{
        input.value+=emoji.textContent;
        emojiPanel.style.display="none";
    };
});

/* CORRUPTION + SCARY MODE */
dontPressBtn.onclick=()=>{
    corruptionLevel+=10;
    if(corruptionLevel>100)corruptionLevel=100;

    document.getElementById("corruptionIndicator").textContent=
        "Corruption: "+corruptionLevel+"%";

    const intensity=corruptionLevel/100;

    document.body.style.background=
        `linear-gradient(135deg,
        rgb(${15+intensity*150},0,${26+intensity*150}),
        rgb(${27+intensity*80},0,${48+intensity*80}))`;

    if(corruptionLevel===100){

        playHorrorSound();

        document.querySelector(".chat-card").classList.add("glitch-mode");

        let flashes=0;
        const interval=setInterval(()=>{
            flicker.style.opacity=flicker.style.opacity==="1"?"0":"1";
            flashes++;
            if(flashes>10){
                clearInterval(interval);
                flicker.style.opacity="0";
            }
        },80);

        setTimeout(()=>{
            const finalMsg=document.createElement("div");
            finalMsg.classList.add("message","shadow-message");
            finalMsg.innerHTML=`<div class="username">Abyss</div><div>You shouldn't be here anymore.</div>`;
            messages.appendChild(finalMsg);
            messages.scrollTop=messages.scrollHeight;
        },1200);

        dontPressBtn.style.display="none";
    }
};
</script>

</body>
</html>
