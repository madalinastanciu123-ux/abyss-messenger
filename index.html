<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌙 Abyss Messenger</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png?v=50">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #0c0815;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    color: white;
}

/* ⭐ Full stars */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image:
        radial-gradient(2px 2px at 10% 20%, white, transparent),
        radial-gradient(2px 2px at 30% 80%, white, transparent),
        radial-gradient(2px 2px at 50% 40%, white, transparent),
        radial-gradient(2px 2px at 70% 10%, white, transparent),
        radial-gradient(2px 2px at 90% 60%, white, transparent),
        radial-gradient(2px 2px at 20% 70%, white, transparent),
        radial-gradient(2px 2px at 80% 30%, white, transparent),
        radial-gradient(2px 2px at 60% 90%, white, transparent);
    opacity: 0.8;
    z-index: 0;
}

/* Card */
.chat-card {
    position: relative;
    z-index: 1;
    width: 420px;
    height: 600px;
    background: rgba(26,20,45,0.97);
    border-radius: 22px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 120px rgba(147,51,234,0.5);
}

.chat-header {
    padding: 20px;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 20px;
    letter-spacing: 3px;
    background: linear-gradient(90deg,#6d28d9,#9333ea);
    border-top-left-radius: 22px;
    border-top-right-radius: 22px;
}

.messages {
    flex: 1;
    padding: 18px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.message-wrapper {
    display: flex;
    flex-direction: column;
    max-width: 75%;
}

.mine {
    align-self: flex-end;
    text-align: right;
}

.username {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: #c084fc;
    margin-bottom: 4px;
}

.message {
    background: rgba(124,58,237,0.25);
    padding: 12px 16px;
    border-radius: 16px;
    word-wrap: break-word;
}

.mine .message {
    background: #7c3aed;
}

.chat-input {
    display: flex;
    gap: 8px;
    padding: 15px;
    background: #1a142d;
    border-bottom-left-radius: 22px;
    border-bottom-right-radius: 22px;
    align-items: center;
}

.chat-input input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #352a54;
    color: white;
}

#usernameInput { width: 100px; }
#messageInput { flex: 1; }

.chat-input button {
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg,#7c3aed,#a855f7);
    color: white;
    cursor: pointer;
}

.emoji-btn {
    font-size: 18px;
    width: 42px;
}
</style>
</head>

<body>

<div class="chat-card">
    <div class="chat-header">🌙 ABYSS MESSENGER</div>
    <div id="messages" class="messages"></div>

    <div class="chat-input">
        <input id="usernameInput" placeholder="Name">
        <input id="messageInput" placeholder="Scrie mesaj...">
        <button class="emoji-btn" id="emojiBtn">😊</button>
        <button onclick="sendMessage()">Trimite</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@joeattardi/emoji-button@4.6.2/dist/index.min.js"></script>

<script>
const socket = io();
const input = document.getElementById("messageInput");
const usernameInput = document.getElementById("usernameInput");
const messages = document.getElementById("messages");
const emojiBtn = document.getElementById("emojiBtn");

const picker = new EmojiButton({ theme: "dark" });

picker.on("emoji", emoji => {
    input.value += emoji;
});

emojiBtn.addEventListener("click", () => {
    picker.togglePicker(emojiBtn);
});

function sendMessage() {
    const message = input.value.trim();
    const username = usernameInput.value.trim();
    if (!username || !message) return;

    socket.emit("send_message", {
        user: username,
        text: message
    });

    input.value = "";
}

input.addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
});

socket.on("receive_message", data => {

    const wrapper = document.createElement("div");
    wrapper.classList.add("message-wrapper");

    if (data.user === usernameInput.value.trim()) {
        wrapper.classList.add("mine");
    }

    const name = document.createElement("div");
    name.classList.add("username");
    name.innerText = data.user;

    const bubble = document.createElement("div");
    bubble.classList.add("message");
    bubble.innerText = data.text;

    wrapper.appendChild(name);
    wrapper.appendChild(bubble);
    messages.appendChild(wrapper);
    messages.scrollTop = messages.scrollHeight;
});
</script>

</body>
</html>
