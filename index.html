<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌙 Abyss Messenger</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    background: #0b0815;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    color: white;
}

/* STAR BACKGROUND */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
        radial-gradient(2px 2px at 10% 20%, white, transparent),
        radial-gradient(2px 2px at 25% 70%, white, transparent),
        radial-gradient(2px 2px at 40% 40%, white, transparent),
        radial-gradient(2px 2px at 60% 10%, white, transparent),
        radial-gradient(2px 2px at 80% 60%, white, transparent),
        radial-gradient(2px 2px at 90% 30%, white, transparent);
    opacity: 0.7;
}

/* CHAT CARD */
.chat-card {
    width: 95%;
    max-width: 480px;
    height: 90vh;
    max-height: 680px;
    background: rgba(24,18,44,0.95);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 80px rgba(147,51,234,0.5);
    overflow: hidden;
}

/* HEADER */
.chat-header {
    padding: 20px;
    text-align: center;
    font-family: 'Cinzel', serif;
    letter-spacing: 3px;
    font-size: 18px;
    background: linear-gradient(90deg,#6d28d9,#9333ea);
}

/* MESSAGES */
.messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* MESSAGE */
.message-wrapper {
    max-width: 75%;
}

.mine {
    align-self: flex-end;
    text-align: right;
}

.username {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: #c084fc;
    margin-bottom: 4px;
}

.message {
    padding: 12px 16px;
    border-radius: 18px;
    background: rgba(124,58,237,0.25);
    word-wrap: break-word;
}

.mine .message {
    background: #7c3aed;
}

/* INPUT AREA */
.chat-input {
    padding: 15px;
    background: #1a142d;
    display: flex;
    gap: 8px;
    align-items: center;
}

.chat-input input {
    padding: 10px;
    border-radius: 12px;
    border: none;
    background: #352a54;
    color: white;
    font-size: 14px;
}

#usernameInput {
    width: 90px;
}

#messageInput {
    flex: 1;
}

.chat-input button {
    padding: 10px 14px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: 500;
}

#sendBtn {
    background: linear-gradient(90deg,#7c3aed,#a855f7);
    color: white;
}

#emojiBtn {
    background: #352a54;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="chat-card">
    <div class="chat-header">🌙 ABYSS MESSENGER</div>

    <div id="messages" class="messages"></div>

    <div class="chat-input">
        <input id="usernameInput" placeholder="Name">
        <input id="messageInput" placeholder="Scrie mesaj...">
        <button id="emojiBtn">😊</button>
        <button id="sendBtn">Trimite</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>

<script>
const socket = io();
const messages = document.getElementById("messages");
const input = document.getElementById("messageInput");
const usernameInput = document.getElementById("usernameInput");
const sendBtn = document.getElementById("sendBtn");
const emojiBtn = document.getElementById("emojiBtn");

/* EMOJI PICKER */
let pickerOpen = false;
let picker;

emojiBtn.onclick = () => {
    if (!pickerOpen) {
        picker = new EmojiMart.Picker({
            theme: "dark",
            onEmojiSelect: (emoji) => {
                input.value += emoji.native;
            }
        });

        picker.style.position = "absolute";
        picker.style.bottom = "80px";
        picker.style.right = "30px";

        document.body.appendChild(picker);
        pickerOpen = true;
    } else {
        picker.remove();
        pickerOpen = false;
    }
};

/* SEND MESSAGE */
function sendMessage() {
    const message = input.value.trim();
    const username = usernameInput.value.trim();
    if (!message || !username) return;

    socket.emit("send_message", {
        user: username,
        text: message
    });

    input.value = "";
}

sendBtn.onclick = sendMessage;

input.addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
});

/* RECEIVE */
socket.on("receive_message", data => {
    const wrapper = document.createElement("div");
    wrapper.classList.add("message-wrapper");

    if (data.user === usernameInput.value.trim()) {
        wrapper.classList.add("mine");
    }

    const name = document.createElement("div");
    name.classList.add("username");
    name.textContent = data.user;

    const bubble = document.createElement("div");
    bubble.classList.add("message");
    bubble.textContent = data.text;

    wrapper.appendChild(name);
    wrapper.appendChild(bubble);
    messages.appendChild(wrapper);
    messages.scrollTop = messages.scrollHeight;
});
</script>

</body>
</html>#
