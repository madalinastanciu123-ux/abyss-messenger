<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🖤 Abyss Messenger</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #140f1f;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* Chat */
.chat-card {
    width: 480px;
    height: 650px;
    background: #1e1830;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 50px rgba(124,58,237,0.3);
}

.chat-header {
    background: linear-gradient(90deg, #5b21b6, #9333ea);
    padding: 20px;
    text-align: center;
    color: white;
    font-weight: bold;
    font-size: 20px;
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* Message bubble */
.message-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 8px;
}

.mine {
    justify-content: flex-end;
}

.avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #7c3aed;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.message {
    background: rgba(124,58,237,0.2);
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 60%;
    color: white;
}

.mine .message {
    background: #7c3aed;
}

.typing {
    font-size: 12px;
    color: #c4b5fd;
    padding: 5px 15px;
}

/* Input */
.chat-input {
    display: flex;
    padding: 15px;
    background: #2a2142;
    gap: 8px;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #3b2f52;
    color: white;
}

.chat-input button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #7c3aed;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat-card">
    <div class="chat-header">🖤 Abyss Messenger</div>
    <div id="messages" class="messages"></div>
    <div id="typing" class="typing"></div>
    <div class="chat-input">
        <input id="usernameInput" placeholder="Username..." />
        <input id="messageInput" placeholder="Scrie mesaj..." />
        <button onclick="sendMessage()">Trimite</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const input = document.getElementById("messageInput");
const usernameInput = document.getElementById("usernameInput");
const messages = document.getElementById("messages");
const typingDiv = document.getElementById("typing");

let currentUser = "";

usernameInput.addEventListener("change", () => {
    currentUser = usernameInput.value.trim();
    socket.emit("register_user", currentUser);
});

socket.on("username_taken", () => {
    alert("Username already taken!");
    usernameInput.value = "";
    currentUser = "";
});

window.sendMessage = function() {
    const message = input.value.trim();
    if (!currentUser || !message) return;

    socket.emit("send_message", {
        user: currentUser,
        text: message
    });

    input.value = "";
};

input.addEventListener("input", () => {
    if (currentUser) {
        socket.emit("typing", currentUser);
    }
});

input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});

socket.on("receive_message", (data) => {

    const wrapper = document.createElement("div");
    wrapper.classList.add("message-wrapper");

    if (data.user === currentUser) {
        wrapper.classList.add("mine");
    }

    const avatar = document.createElement("div");
    avatar.classList.add("avatar");
    avatar.innerText = data.user.charAt(0).toUpperCase();

    const bubble = document.createElement("div");
    bubble.classList.add("message");
    bubble.innerText = data.text;

    if (data.user === currentUser) {
        wrapper.appendChild(bubble);
        wrapper.appendChild(avatar);
    } else {
        wrapper.appendChild(avatar);
        wrapper.appendChild(bubble);
    }

    messages.appendChild(wrapper);
    messages.scrollTop = messages.scrollHeight;
});

socket.on("user_typing", (username) => {
    typingDiv.innerText = username + " is typing...";
    setTimeout(() => typingDiv.innerText = "", 1500);
});
</script>

</body>
</html>
