<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🖤 Abyss Messenger</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<link rel="icon" type="image/png" href="favicon.png?v=5">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1b1230, #0f0b1a 70%);
    font-family: 'Inter', sans-serif;
    color: white;
}

/* ⭐ STARS BACKGROUND */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: transparent;
    background-image: radial-gradient(2px 2px at 20% 30%, white, transparent),
                      radial-gradient(1.5px 1.5px at 70% 60%, white, transparent),
                      radial-gradient(2px 2px at 40% 80%, white, transparent),
                      radial-gradient(1.5px 1.5px at 85% 20%, white, transparent);
    animation: twinkle 4s infinite alternate;
    opacity: 0.4;
    z-index: 0;
}

@keyframes twinkle {
    from { opacity: 0.3; }
    to { opacity: 0.6; }
}

.chat-card {
    position: relative;
    z-index: 1;
    width: 500px;
    height: 650px;
    backdrop-filter: blur(20px);
    background: rgba(30,24,48,0.85);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 80px rgba(124,58,237,0.4);
}

.chat-header {
    background: linear-gradient(90deg, #5b21b6, #9333ea);
    padding: 20px;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 22px;
    letter-spacing: 2px;
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.message-wrapper {
    display: flex;
    flex-direction: column;
    max-width: 70%;
}

.mine {
    align-self: flex-end;
    text-align: right;
}

.username {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: #c084fc;
    margin-bottom: 4px;
}

.message {
    background: rgba(124,58,237,0.2);
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
}

.mine .message {
    background: #7c3aed;
}

.chat-input {
    display: flex;
    padding: 15px;
    background: rgba(40,30,70,0.8);
    gap: 8px;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #3b2f52;
    color: white;
}

.chat-input button {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #7c3aed, #a855f7);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.chat-input button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="chat-card">
    <div class="chat-header">🌙 Abyss Messenger</div>
    <div id="messages" class="messages"></div>
    <div class="chat-input">
        <input id="usernameInput" placeholder="Username..." />
        <input id="messageInput" placeholder="Scrie mesaj..." />
        <button onclick="sendMessage()">Trimite</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const input = document.getElementById("messageInput");
const usernameInput = document.getElementById("usernameInput");
const messages = document.getElementById("messages");

const params = new URLSearchParams(window.location.search);
const room = params.get("room") || "default";
socket.emit("join_room", room);

window.sendMessage = function() {
    const message = input.value.trim();
    const username = usernameInput.value.trim();
    if (!username || !message) return;

    socket.emit("send_message", {
        room: room,
        user: username,
        text: message
    });

    input.value = "";
};

input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});

socket.on("receive_message", (data) => {

    const wrapper = document.createElement("div");
    wrapper.classList.add("message-wrapper");

    if (data.user === usernameInput.value.trim()) {
        wrapper.classList.add("mine");
    }

    const name = document.createElement("div");
    name.classList.add("username");
    name.innerText = data.user;

    const bubble = document.createElement("div");
    bubble.classList.add("message");
    bubble.innerText = data.text;

    wrapper.appendChild(name);
    wrapper.appendChild(bubble);

    messages.appendChild(wrapper);
    messages.scrollTop = messages.scrollHeight;
});
</script>

</body>
</html>
